# minestrate.example.yaml — copy to minestrate.yaml and edit
env: dev  # dev | prod  — dev prints a JWT on startup and defaults to mock Docker

server:
  port: 8080
  # tls_cert: ""      # optional: path to cert.pem
  # tls_key: ""       # optional: path to key.pem
  # advertised_address: ""  # optional: public address returned in API responses

auth:
  jwt_secret: "this-is-a-very-long-secret-key-32-bytes"  # ≥32 bytes, prod must change this
  token_ttl: 300                                          # JWT lifetime in seconds
  rate_limit:
    refill_rate: 10.0   # tokens per second added to bucket
    capacity: 100       # max burst

docker:
  # socket: ""                     # default: platform socket (unix:///var/run/docker.sock or npipe)
  image: pmmp/pocketmine-mp:latest # required
  cpu_limit: 1.0
  memory_limit: "512m"

orchestrator:
  workers: 4
  max_servers: 100
  start_timeout: 30  # seconds before container start is considered failed

ports:
  range_start: 19132
  range_end: 20132

network:
  mode: simple                       # "simple" (shared network) or "isolated" (per-server /28 subnet)
  # subnet_block: "172.20.0.0/14"    # required when mode=isolated; must be <= /28
  default_network: "minestrate"      # required in simple mode, or when isolated + enable_fallback
  enable_fallback: false             # when isolated mode fails to create a subnet, fall back to default_network
